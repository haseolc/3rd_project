name: Security Scan

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-scan:
    name: Checkov and Trivy Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      # ------------------------------------------------------
      # Checkov 설치
      # ------------------------------------------------------
      - name: Install Checkov
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install checkov==3.3.2

      # ------------------------------------------------------
      # 전체 Baseline
      # Terraform의 현재 아키텍처 경고를 기록하되 차단하지 않음
      # ------------------------------------------------------
      - name: Run Checkov baseline scan
        run: |
          checkov \
            --directory . \
            --quiet \
            --compact \
            --soft-fail \
            --skip-path .git \
            --skip-path .terraform

      # ------------------------------------------------------
      # Kubernetes Hard Gate
      # 실패 항목이 있으면 Workflow 차단
      # ------------------------------------------------------
      - name: Run Checkov Kubernetes security gate
        run: |
          checkov \
            --directory k8s \
            --framework kubernetes \
            --quiet \
            --compact

      # ------------------------------------------------------
      # Ansible Hard Gate
      # 실패 항목이 있으면 Workflow 차단
      # ------------------------------------------------------
      - name: Run Checkov Ansible security gate
        run: |
          checkov \
            --directory ansible \
            --framework ansible \
            --quiet \
            --compact

      # ------------------------------------------------------
      # Secret Hard Gate
      # 저장소에서 Secret이 탐지되면 Workflow 차단
      # ------------------------------------------------------
      - name: Run Trivy secret security gate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          severity: HIGH,CRITICAL
          format: table
          exit-code: "1"

      # ------------------------------------------------------
      # Kubernetes IaC Hard Gate
      # HIGH 또는 CRITICAL 구성 오류가 있으면 차단
      # ------------------------------------------------------
      - name: Run Trivy Kubernetes IaC security gate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: config
          scan-ref: k8s
          severity: HIGH,CRITICAL
          format: table
          exit-code: "1"
          skip-setup-trivy: true

      # ------------------------------------------------------
      # 전체 IaC Baseline
      # Terraform의 현재 잔여 위험을 기록하되 차단하지 않음
      # ------------------------------------------------------
      - name: Run Trivy full IaC baseline scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          format: table
          exit-code: "0"
          skip-setup-trivy: true
