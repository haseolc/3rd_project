name: Infra Provision

#checkov:skip=CKV_GHA_7:confirm_provision is an intentional manual safety gate; the value is only compared with the fixed string provision and is not passed to Terraform or shell commands.
on:
  workflow_dispatch:
    inputs:
      confirm_provision:
        description: "Type provision to confirm infrastructure changes"
        required: true
        default: "no"

permissions: {}

jobs:
  security-gate:
    name: Security Gate
    permissions:
      contents: read
    uses: ./.github/workflows/security-scan.yml

  verify-provision-oidc:
    name: Verify Provision OIDC
    needs: security-gate
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: arn:aws:iam::416170614736:role/3rd-project/3rd-project-github-provision
          role-session-name: GitHubActions-InfraProvision-Verify
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS OIDC identity
        run: aws sts get-caller-identity

  provision-infra-and-k8s:
    needs:
      - security-gate
      - verify-provision-oidc
    if: ${{ inputs.confirm_provision == 'provision' }}
    name: Provision EC2 and Configure Kubernetes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_STATE_KEY: 3rd_project/terraform.tfstate

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: arn:aws:iam::416170614736:role/3rd-project/3rd-project-github-provision
          role-session-name: GitHubActions-InfraProvision
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS OIDC identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - name: Terraform init with S3 backend
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Terraform format and validate
        working-directory: terraform
        run: |
          terraform fmt -check -recursive
          terraform validate

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Authorize temporary SSH access for runner
        run: |
          set -euo pipefail

          RUNNER_IP=$(curl -fsSL https://checkip.amazonaws.com | tr -d '[:space:]')

          if [[ ! "$RUNNER_IP" =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]]; then
            echo "Invalid runner public IP: $RUNNER_IP"
            exit 1
          fi

          SG_ID=$(terraform -chdir=terraform output -raw security_group_id)

          if [[ ! "$SG_ID" =~ ^sg-[0-9a-f]+$ ]]; then
            echo "Invalid Terraform security group ID: $SG_ID"
            exit 1
          fi
          RUNNER_CIDR="${RUNNER_IP}/32"

          SSH_RULE_ID=$(aws ec2 authorize-security-group-ingress \
            --group-id "$SG_ID" \
            --protocol tcp \
            --port 22 \
            --cidr "$RUNNER_CIDR" \
            --query 'SecurityGroupRules[0].SecurityGroupRuleId' \
            --output text)

          if [[ ! "$SSH_RULE_ID" =~ ^sgr-[0-9a-f]+$ ]]; then
            echo "Invalid security group rule ID: $SSH_RULE_ID"
            exit 1
          fi

          echo "SG_ID=$SG_ID" >> "$GITHUB_ENV"
          echo "RUNNER_CIDR=$RUNNER_CIDR" >> "$GITHUB_ENV"
          echo "SSH_RULE_ID=$SSH_RULE_ID" >> "$GITHUB_ENV"

          echo "Temporary SSH access authorized: $RUNNER_CIDR"
          echo "Temporary SSH rule ID: $SSH_RULE_ID"

      - name: Wait for EC2 instances
        run: |
          set -e

          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=k8s-master,k8s-worker-1,k8s-worker-2" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text)

          echo "Instance IDs: $INSTANCE_IDS"

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No running Kubernetes EC2 instances found."
            exit 1
          fi

          aws ec2 wait instance-status-ok --instance-ids $INSTANCE_IDS

      - name: Get current EC2 public IPs
        run: |
          set -e

          get_ip() {
            NAME=$1
            IP=$(aws ec2 describe-instances \
              --filters \
                "Name=tag:Name,Values=${NAME}" \
                "Name=instance-state-name,Values=running" \
              --query "Reservations[].Instances[].PublicIpAddress" \
              --output text)

            COUNT=$(echo "$IP" | wc -w)

            if [ "$COUNT" -ne 1 ]; then
              echo "Expected exactly one running ${NAME}, but found ${COUNT}."
              echo "Found IPs: ${IP}"
              exit 1
            fi

            echo "$IP"
          }

          MASTER_IP=$(get_ip "k8s-master")
          WORKER1_IP=$(get_ip "k8s-worker-1")
          WORKER2_IP=$(get_ip "k8s-worker-2")

          echo "MASTER_IP=$MASTER_IP" >> $GITHUB_ENV
          echo "WORKER1_IP=$WORKER1_IP" >> $GITHUB_ENV
          echo "WORKER2_IP=$WORKER2_IP" >> $GITHUB_ENV

          echo "Master: $MASTER_IP"
          echo "Worker-1: $WORKER1_IP"
          echo "Worker-2: $WORKER2_IP"

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.MASTER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/k8s-key.pem
          chmod 600 ~/.ssh/k8s-key.pem

      - name: Wait for SSH
        run: |
          set -e

          for HOST in "$MASTER_IP" "$WORKER1_IP" "$WORKER2_IP"; do
            echo "Waiting for SSH on $HOST"

            for i in {1..30}; do
              if ssh -i ~/.ssh/k8s-key.pem \
                -o StrictHostKeyChecking=no \
                -o ConnectTimeout=10 \
                ${{ secrets.MASTER_USER }}@$HOST "echo SSH_OK"; then
                echo "SSH ready on $HOST"
                break
              fi

              echo "SSH not ready yet on $HOST. retry=$i"
              sleep 10
            done
          done

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Generate Ansible inventory
        run: |
          cat > ansible/inventory.ci.ini <<EOF
          [master]
          k8s-master ansible_host=${MASTER_IP}

          [worker]
          k8s-worker-1 ansible_host=${WORKER1_IP}
          k8s-worker-2 ansible_host=${WORKER2_IP}

          [k8s:children]
          master
          worker

          [k8s:vars]
          ansible_user=${{ secrets.MASTER_USER }}
          ansible_ssh_private_key_file=~/.ssh/k8s-key.pem
          ansible_python_interpreter=/usr/bin/python3
          ansible_ssh_common_args='-o StrictHostKeyChecking=no'
          EOF

          cat ansible/inventory.ci.ini

      - name: Ansible ping
        run: |
          ansible -i ansible/inventory.ci.ini k8s -m ping

      - name: Configure Kubernetes with Ansible
        run: |
          ansible-playbook -i ansible/inventory.ci.ini ansible/site.yml

      - name: Verify Kubernetes nodes
        run: |
          ssh -i ~/.ssh/k8s-key.pem \
            -o StrictHostKeyChecking=no \
            ${{ secrets.MASTER_USER }}@$MASTER_IP "
              kubectl wait --for=condition=Ready nodes --all --timeout=300s
              kubectl get nodes -o wide
            "

      - name: Deploy smoke test
        run: |
          ssh -i ~/.ssh/k8s-key.pem \
            -o StrictHostKeyChecking=no \
            ${{ secrets.MASTER_USER }}@$MASTER_IP "
              mkdir -p ~/deploy/3rd_project/k8s/smoke-test
            "

          scp -i ~/.ssh/k8s-key.pem \
            -o StrictHostKeyChecking=no \
            -r k8s/smoke-test/* \
            ${{ secrets.MASTER_USER }}@$MASTER_IP:~/deploy/3rd_project/k8s/smoke-test/

          ssh -i ~/.ssh/k8s-key.pem \
            -o StrictHostKeyChecking=no \
            ${{ secrets.MASTER_USER }}@$MASTER_IP "
              kubectl apply -f ~/deploy/3rd_project/k8s/smoke-test/namespace.yml &&

              until kubectl get namespace ci-cd-test >/dev/null 2>&1; do
                echo 'Waiting for namespace ci-cd-test...'
                sleep 2
              done &&

              kubectl apply -f ~/deploy/3rd_project/k8s/smoke-test/service-account.yml &&
              kubectl apply -f ~/deploy/3rd_project/k8s/smoke-test/deployment.yml &&
              kubectl apply -f ~/deploy/3rd_project/k8s/smoke-test/service.yml &&
              kubectl apply -f ~/deploy/3rd_project/k8s/smoke-test/network-policy.yml &&

              kubectl rollout restart deployment/ci-cd-smoke-app -n ci-cd-test &&
              kubectl rollout status deployment/ci-cd-smoke-app -n ci-cd-test --timeout=120s &&
              kubectl get pods -n ci-cd-test -o wide &&
              kubectl get svc -n ci-cd-test
            "

      - name: Wait for ALB targets to become healthy
        run: |
          set -euo pipefail

          TARGET_GROUP_ARN=$(aws elbv2 describe-target-groups \
            --names 3rd-project-smoke-tg \
            --query 'TargetGroups[0].TargetGroupArn' \
            --output text)

          if [ -z "$TARGET_GROUP_ARN" ] || [ "$TARGET_GROUP_ARN" = "None" ]; then
            echo "Target Group ARN not found."
            exit 1
          fi

          echo "TARGET_GROUP_ARN=$TARGET_GROUP_ARN" >> "$GITHUB_ENV"

          for attempt in {1..30}; do
            STATES=$(aws elbv2 describe-target-health \
              --target-group-arn "$TARGET_GROUP_ARN" \
              --query 'TargetHealthDescriptions[].TargetHealth.State' \
              --output text)

            TOTAL=$(wc -w <<< "$STATES" | tr -d '[:space:]')
            HEALTHY=$(tr '\t' '\n' <<< "$STATES" | grep -cx 'healthy' || true)

            echo "attempt=$attempt states=${STATES:-none}"

            if [ "$TOTAL" -eq 2 ] && [ "$HEALTHY" -eq 2 ]; then
              echo "Both Kubernetes worker targets are healthy."
              break
            fi

            if [ "$attempt" -eq 30 ]; then
              aws elbv2 describe-target-health \
                --target-group-arn "$TARGET_GROUP_ARN"

              echo "ALB targets did not become healthy."
              exit 1
            fi

            sleep 10
          done

      - name: Verify WAF-protected ALB endpoint
        run: |
          set -euo pipefail

          ALB_URL=$(terraform -chdir=terraform output -raw smoke_alb_url)
          echo "ALB_URL=$ALB_URL" >> "$GITHUB_ENV"

          NORMAL_STATUS=$(curl -sS \
            -o /tmp/alb-normal-response.txt \
            -w '%{http_code}' \
            --retry 6 \
            --retry-delay 10 \
            --retry-all-errors \
            "$ALB_URL/")

          echo "Normal request status: $NORMAL_STATUS"

          if [ "$NORMAL_STATUS" != "200" ]; then
            cat /tmp/alb-normal-response.txt || true
            echo "Expected normal ALB request to return HTTP 200."
            exit 1
          fi

          BLOCK_STATUS=$(curl -sS \
            -o /tmp/alb-waf-block-response.txt \
            -w '%{http_code}' \
            --get \
            --data-urlencode 'q=${jndi:ldap://example.com/test}' \
            "$ALB_URL/")

          echo "WAF test request status: $BLOCK_STATUS"

          if [ "$BLOCK_STATUS" != "403" ]; then
            cat /tmp/alb-waf-block-response.txt || true
            echo "Expected malicious test request to be blocked with HTTP 403."
            exit 1
          fi

          echo "ALB normal request and AWS WAF blocking test passed."

      - name: Revoke temporary SSH access
        if: ${{ always() && env.SSH_RULE_ID != '' }}
        run: |
          set -euo pipefail

          aws ec2 revoke-security-group-ingress \
            --group-id "$SG_ID" \
            --security-group-rule-ids "$SSH_RULE_ID"

          echo "Temporary SSH access revoked: $RUNNER_CIDR"
          echo "Revoked SSH rule ID: $SSH_RULE_ID"
