name: K8s Smoke CD

on:
  workflow_dispatch:
    inputs:
      execution_mode:
        description: "Choose oidc-only to test AWS authentication without deployment"
        required: true
        type: choice
        options:
          - oidc-only
          - deploy
        default: oidc-only

permissions:
  contents: read
  id-token: write

jobs:
  deploy-smoke-test:
    name: Deploy Smoke Test to Kubernetes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::416170614736:role/3rd-project/3rd-project-github-smoke
          role-session-name: GitHubActions-K8sSmokeCD
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS OIDC identity
        run: |
          aws --version
          aws sts get-caller-identity

      - name: Get current master public IP by EC2 tag
        if: ${{ inputs.execution_mode == 'deploy' }}
        run: |
          MASTER_HOST=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=k8s-master" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].PublicIpAddress" \
            --output text)

          COUNT=$(echo "$MASTER_HOST" | wc -w)

          if [ "$COUNT" -ne 1 ]; then
            echo "Expected exactly one running k8s-master instance, but found $COUNT."
            echo "Found hosts: $MASTER_HOST"
            exit 1
          fi

          echo "MASTER_HOST=$MASTER_HOST" >> $GITHUB_ENV
          echo "Current master host: $MASTER_HOST"

      - name: Configure SSH key
        if: ${{ inputs.execution_mode == 'deploy' }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.MASTER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/k8s-key.pem
          chmod 600 ~/.ssh/k8s-key.pem
          ssh-keyscan -H "$MASTER_HOST" >> ~/.ssh/known_hosts

      - name: Copy Kubernetes manifests to master node
        if: ${{ inputs.execution_mode == 'deploy' }}
        run: |
          ssh -i ~/.ssh/k8s-key.pem ${{ secrets.MASTER_USER }}@$MASTER_HOST "mkdir -p ~/deploy/3rd_project/k8s/smoke-test"
          scp -i ~/.ssh/k8s-key.pem -r k8s/smoke-test/* ${{ secrets.MASTER_USER }}@$MASTER_HOST:~/deploy/3rd_project/k8s/smoke-test/

      - name: Apply Kubernetes manifests
        if: ${{ inputs.execution_mode == 'deploy' }}
        run: |
          ssh -i ~/.ssh/k8s-key.pem ${{ secrets.MASTER_USER }}@$MASTER_HOST "
            kubectl apply -f ~/deploy/3rd_project/k8s/smoke-test/namespace.yml &&

            until kubectl get namespace ci-cd-test >/dev/null 2>&1; do
              echo 'Waiting for namespace ci-cd-test...'
              sleep 2
            done &&

            kubectl apply -f ~/deploy/3rd_project/k8s/smoke-test/deployment.yml &&
            kubectl apply -f ~/deploy/3rd_project/k8s/smoke-test/service.yml &&

            kubectl rollout status deployment/ci-cd-smoke-app -n ci-cd-test --timeout=120s &&
            kubectl get pods -n ci-cd-test -o wide &&
            kubectl get svc -n ci-cd-test
          "
