name: Infra Destroy

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type destroy to confirm infrastructure deletion'
        required: true
        default: 'no'

jobs:
  verify-destroy-oidc:
    name: Verify Destroy OIDC
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: arn:aws:iam::416170614736:role/3rd-project/3rd-project-github-destroy
          role-session-name: GitHubActions-InfraDestroy-Verify
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS OIDC identity
        run: aws sts get-caller-identity

  destroy-infra:
    needs: verify-destroy-oidc
    if: ${{ inputs.confirm_destroy == 'destroy' }}
    name: Destroy EC2 infrastructure
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_STATE_KEY: 3rd_project/terraform.tfstate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: arn:aws:iam::416170614736:role/3rd-project/3rd-project-github-destroy
          role-session-name: GitHubActions-InfraDestroy
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS OIDC identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init with S3 backend
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Terraform destroy plan
        working-directory: terraform
        run: terraform plan -destroy

      - name: Terraform destroy
        working-directory: terraform
        run: terraform destroy -auto-approve