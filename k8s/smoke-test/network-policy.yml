apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ci-cd-smoke-app-policy
  namespace: ci-cd-test
spec:
  podSelector:
    matchLabels:
      app: ci-cd-smoke-app

  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8080

    - from:
        - ipBlock:
            cidr: 10.0.0.0/16
        - ipBlock:
            cidr: 192.168.0.0/16
      ports:
        - protocol: TCP
          port: 8080

  egress: []
