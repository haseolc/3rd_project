apiVersion: apps/v1
kind: Deployment
metadata:
  name: ci-cd-smoke-app
  namespace: ci-cd-test
  labels:
    app: ci-cd-smoke-app
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: ci-cd-smoke-app
  template:
    metadata:
      labels:
        app: ci-cd-smoke-app
    spec:
      serviceAccountName: ci-cd-smoke-app
      automountServiceAccountToken: false

      securityContext:
        runAsNonRoot: true
        runAsUser: 10101
        runAsGroup: 10101
        fsGroup: 10101
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged@sha256:b3f2436575bd5be7386518084d842dac414ab4962712afa31e99e0942a56e3b2
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10101
            runAsGroup: 10101
            capabilities:
              drop:
                - ALL

          readinessProbe:
            httpGet:
              path: /
              port: http
              scheme: HTTP
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: http
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"

          volumeMounts:
            - name: nginx-tmp
              mountPath: /tmp

      volumes:
        - name: nginx-tmp
          emptyDir: {}
