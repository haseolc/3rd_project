apiVersion: v1
kind: Pod
metadata:
  name: postgresql-secret-verification
  namespace: ops-platform
  labels:
    app.kubernetes.io/name: secret-verification
    app.kubernetes.io/part-of: 3rd-project
spec:
  restartPolicy: Never

  containers:
    - name: verifier
      image: busybox:1.36.1
      command:
        - /bin/sh
        - -c
        - |
          test -n "${DB_USERNAME}"
          test -n "${DB_PASSWORD}"
          test -n "${DB_NAME}"
          test -n "${DB_PORT}"
          echo "PostgreSQL secret injection verified"
          sleep 3600

      env:
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: postgresql-credentials
              key: username

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgresql-credentials
              key: password

        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: postgresql-credentials
              key: database

        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: postgresql-credentials
              key: port
