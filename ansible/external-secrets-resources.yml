---
- name: Deploy and verify External Secrets resources
  hosts: master
  become: yes

  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

  vars:
    external_secrets_manifest_dir: /home/ubuntu/deploy/3rd_project/k8s/external-secrets

  tasks:
    - name: Create External Secrets manifest directory
      ansible.builtin.file:
        path: "{{ external_secrets_manifest_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Copy External Secrets manifests
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../k8s/external-secrets/{{ item }}"
        dest: "{{ external_secrets_manifest_dir }}/{{ item }}"
        owner: ubuntu
        group: ubuntu
        mode: "0644"
      loop:
        - namespace.yml
        - secret-store.yml
        - external-secret.yml
        - verification-service-account.yml
        - verification-pod.yml

    - name: Wait for External Secrets CRDs
      ansible.builtin.command: >
        kubectl wait
        --for=condition=Established
        crd/secretstores.external-secrets.io
        crd/externalsecrets.external-secrets.io
        --timeout=180s
      changed_when: false

    - name: Apply application namespace
      ansible.builtin.command: >
        kubectl apply
        -f {{ external_secrets_manifest_dir }}/namespace.yml

    - name: Apply verification ServiceAccount
      ansible.builtin.command: >
        kubectl apply
        -f {{ external_secrets_manifest_dir }}/verification-service-account.yml

    - name: Apply AWS SecretStore
      ansible.builtin.command: >
        kubectl apply
        -f {{ external_secrets_manifest_dir }}/secret-store.yml

    - name: Wait for AWS SecretStore to become Ready
      ansible.builtin.command: >
        kubectl wait
        --for=condition=Ready
        secretstore/aws-secrets-manager
        --namespace ops-platform
        --timeout=180s
      changed_when: false

    - name: Apply PostgreSQL ExternalSecret
      ansible.builtin.command: >
        kubectl apply
        -f {{ external_secrets_manifest_dir }}/external-secret.yml

    - name: Wait for PostgreSQL ExternalSecret to become Ready
      ansible.builtin.command: >
        kubectl wait
        --for=condition=Ready
        externalsecret/postgresql-credentials
        --namespace ops-platform
        --timeout=180s
      changed_when: false

    - name: Remove previous verification pod
      ansible.builtin.command: >
        kubectl delete pod postgresql-secret-verification
        --namespace ops-platform
        --ignore-not-found=true
      changed_when: false

    - name: Apply Secret verification pod
      ansible.builtin.command: >
        kubectl apply
        -f {{ external_secrets_manifest_dir }}/verification-pod.yml

    - name: Wait for verification pod to become Ready
      ansible.builtin.command: >
        kubectl wait
        --for=condition=Ready
        pod/postgresql-secret-verification
        --namespace ops-platform
        --timeout=180s
      changed_when: false

    - name: Read verification pod logs
      ansible.builtin.command: >
        kubectl logs postgresql-secret-verification
        --namespace ops-platform
      register: verification_logs
      changed_when: false

    - name: Confirm Secret injection
      ansible.builtin.assert:
        that:
          - "'PostgreSQL secret injection verified' in verification_logs.stdout"
        fail_msg: PostgreSQL Secret injection verification failed
        success_msg: PostgreSQL Secret injection verified without exposing values

    - name: Remove verification pod
      ansible.builtin.command: >
        kubectl delete pod postgresql-secret-verification
        --namespace ops-platform
        --ignore-not-found=true
      changed_when: false
