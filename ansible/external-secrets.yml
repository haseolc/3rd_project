---
- name: Install External Secrets Operator
  hosts: master
  become: yes

  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

  tasks:
    - name: Wait for Worker 2 to become Ready
      ansible.builtin.command: >
        kubectl wait
        --for=condition=Ready
        node/k8s-worker-2
        --timeout=300s
      changed_when: false

    - name: Label Worker 2 for External Secrets workloads
      ansible.builtin.command: >
        kubectl label node k8s-worker-2
        workload=external-secrets
        --overwrite

    - name: Taint Worker 2 for External Secrets workloads
      ansible.builtin.command: >
        kubectl taint node k8s-worker-2
        workload=external-secrets:NoSchedule
        --overwrite

    - name: Add External Secrets Helm repository
      ansible.builtin.command: >
        helm repo add external-secrets
        https://charts.external-secrets.io
        --force-update

    - name: Update Helm repositories
      ansible.builtin.command: helm repo update
      changed_when: false

    - name: Install External Secrets Operator
      ansible.builtin.command: >
        helm upgrade --install external-secrets
        external-secrets/external-secrets
        --namespace external-secrets
        --create-namespace
        --version 2.6.0
        --set installCRDs=true
        --set global.nodeSelector.workload=external-secrets
        --set global.tolerations[0].key=workload
        --set global.tolerations[0].operator=Equal
        --set global.tolerations[0].value=external-secrets
        --set global.tolerations[0].effect=NoSchedule
        --wait
        --timeout 5m

    - name: Verify External Secrets Operator pods
      ansible.builtin.command: >
        kubectl get pods
        --namespace external-secrets
        --output wide
      register: external_secrets_pods
      changed_when: false

    - name: Display External Secrets Operator pods
      ansible.builtin.debug:
        var: external_secrets_pods.stdout_lines
